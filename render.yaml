services:
  - type: web
    name: husam-prime-ai-final
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: HUSAM_PROVIDER
        value: auto
      - key: ENABLE_SCRIPT_RUNNER
        value: false
